# comitup headless wifi onboarding.
# On first boot (no known wifi) the Pi raises an access point named below; connect a phone/laptop to it and
# a captive portal lets you pick your home wifi + enter the password. After that it auto-connects normally.
# Then reach the robot at http://autobot.local:8200. Docs: https://davesteele.github.io/comitup/
[DEFAULT]
# <nnnn> is replaced with the last digits of the wifi MAC, so each unit gets a unique AP name.
ap_name: Autobot-<nnnn>
# ap_password: set-an-ap-password   # uncomment to passphrase-protect the setup AP
enable_appliance_mode: 0
