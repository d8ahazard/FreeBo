[pytest]
asyncio_mode = auto
testpaths = tests
# P0-R4.9: a hard per-test timeout so a wedged test can never hang the whole suite; on timeout pytest-timeout
# dumps every thread + asyncio task stack so the lifecycle leak/deadlock is diagnosable. faulthandler also
# dumps if the WHOLE run exceeds its budget.
addopts = -ra --timeout=60 --timeout-method=thread
faulthandler_timeout = 600
markers =
    hardware: live-robot test that needs a running Autobot app (enable with --hardware)
filterwarnings =
    ignore::DeprecationWarning
