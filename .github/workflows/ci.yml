name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ffmpeg (TTS + synthetic camera frames)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          # Optional: exercise the real frame-diff path in the motion tests.
          pip install opencv-python-headless numpy

      - name: Protocol byte-identity gate (eboproto == frames.py)
        run: python scripts/eboproto_check.py

      - name: Run the test suite (mock-based; hardware tests skipped)
        run: python -m pytest -q
